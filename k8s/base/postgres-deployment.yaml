apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: documentstream
  labels:
    app: postgres
    app.kubernetes.io/part-of: documentstream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: documentstream
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: documentstream
            - name: POSTGRES_USER
              value: documentstream
            - name: POSTGRES_PASSWORD
              value: documentstream
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-postgresql
  namespace: documentstream
  labels:
    app: postgres
    app.kubernetes.io/part-of: documentstream
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
