apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-worker
  namespace: documentstream
  labels:
    app: store-worker
    app.kubernetes.io/part-of: documentstream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-worker
  template:
    metadata:
      labels:
        app: store-worker
        app.kubernetes.io/part-of: documentstream
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9102"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: store-worker
          image: acrdocumentstream.azurecr.io/worker:latest
          imagePullPolicy: Always
          command: ["uv", "run", "python", "-m", "worker.store_runner"]
          ports:
            - name: metrics
              containerPort: 9102
              protocol: TCP
          envFrom:
            - configMapRef:
                name: documentstream-config
            - secretRef:
                name: documentstream-secrets
                optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
