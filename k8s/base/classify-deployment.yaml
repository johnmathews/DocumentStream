apiVersion: apps/v1
kind: Deployment
metadata:
  name: classify-worker
  namespace: documentstream
  labels:
    app: classify-worker
    app.kubernetes.io/part-of: documentstream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: classify-worker
  template:
    metadata:
      labels:
        app: classify-worker
        app.kubernetes.io/part-of: documentstream
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: classify-worker
          image: acrdocumentstream.azurecr.io/worker:latest
          imagePullPolicy: Always
          command: ["uv", "run", "python", "-m", "worker.classify_runner"]
          envFrom:
            - configMapRef:
                name: documentstream-config
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
