# PodChaos: Kill classify-worker pods to demonstrate self-healing
#
# Demo value:
#   Kubernetes detects the killed pods and restarts them within seconds.
#   Meanwhile, Redis consumer groups guarantee at-least-once delivery —
#   any unacknowledged messages are re-delivered to surviving or newly
#   started workers. The pipeline recovers automatically with zero
#   manual intervention and zero message loss.
#
# Usage:
#   kubectl apply -f k8s/chaos/pod-kill.yaml
#   kubectl get podchaos -n documentstream
#   kubectl delete podchaos pod-kill-classify-worker -n documentstream

apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-kill-classify-worker
  namespace: documentstream
  annotations:
    chaos-mesh.org/description: >-
      Kill 2 classify-worker pods to verify K8s self-healing and Redis
      at-least-once message delivery. Pods should restart within seconds
      and resume processing without data loss.
spec:
  action: pod-kill
  mode: fixed-number
  value: "2"
  selector:
    namespaces:
      - documentstream
    labelSelectors:
      app: classify-worker
  duration: "30s"
