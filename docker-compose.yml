services:
  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://documentstream:documentstream@postgres:5432/documentstream
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  extract-worker:
    build:
      context: .
      dockerfile: src/worker/Dockerfile
    command: ["uv", "run", "python", "-m", "worker.extract_runner"]
    environment:
      - PYTHONPATH=/app/src
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_started

  classify-worker:
    build:
      context: .
      dockerfile: src/worker/Dockerfile
    command: ["uv", "run", "python", "-m", "worker.classify_runner"]
    environment:
      - PYTHONPATH=/app/src
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_started

  store-worker:
    build:
      context: .
      dockerfile: src/worker/Dockerfile
    command: ["uv", "run", "python", "-m", "worker.store_runner"]
    ports:
      - "9102:9102"
    environment:
      - PYTHONPATH=/app/src
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://documentstream:documentstream@postgres:5432/documentstream
      - BLOB_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - BLOB_CONTAINER=documents
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
    command: ["azurite-blob", "--blobHost", "0.0.0.0", "--blobPort", "10000"]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: documentstream
      POSTGRES_USER: documentstream
      POSTGRES_PASSWORD: documentstream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/worker/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documentstream"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
